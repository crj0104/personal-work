<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}"></head>
<body class="bg-gray-50 min-h-screen font-sans">

<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a href="/" class="text-2xl font-black text-brand-600 tracking-tight">🍽 美味订餐</a>
      <div class="flex items-center gap-4">
        <a href="/cart" class="relative text-gray-700 hover:text-brand-600 font-medium transition">
          🛒 购物车
          <span th:if="${session.user != null}" id="cart-badge"
                class="absolute -top-2 -right-4 bg-brand-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </a>
        <th:block th:if="${session.user != null}">
          <a href="/orders" class="text-gray-700 hover:text-brand-600 font-medium transition">📋 我的订单</a>
          <span class="text-gray-400">|</span>
          <span class="text-sm text-gray-500" th:text="${session.user.phone}"></span>
          <a href="/logout" class="text-gray-500 hover:text-red-500 text-sm transition">退出</a>
        </th:block>
        <th:block th:unless="${session.user != null}">
          <a href="/login" class="bg-brand-500 text-white px-5 py-2 rounded-full font-medium hover:bg-brand-600 shadow-md transition-all">登录</a>
        </th:block>
      </div>
    </div>
  </div>
</nav>

<div th:if="${success}" class="max-w-7xl mx-auto px-4 mt-3">
  <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm" th:text="${success}"></div>
</div>
<div th:if="${error}" class="max-w-7xl mx-auto px-4 mt-3">
  <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm" th:text="${error}"></div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
  <div class="text-center mb-10">
    <h1 class="text-4xl font-black text-gray-800">今天想吃什么？</h1>
    <p class="text-gray-500 mt-2 text-lg">精选美食，一键下单送到手</p>
  </div>

  <th:block th:each="entry : ${groupedProducts}">
    <div class="mb-12">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-brand-500 rounded-full inline-block"></span>
        <span th:text="${entry.key.name}"></span>
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5">
        <div th:each="product : ${entry.value}"
             class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden group cursor-pointer transform hover:-translate-y-1">
          <div class="h-48 overflow-hidden">
            <img th:src="${product.imageUrl}" th:alt="${product.name}"
                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"/>
          </div>
          <div class="p-4">
            <h3 class="font-bold text-gray-800 text-lg" th:text="${product.name}"></h3>
            <div class="flex items-center justify-between mt-3">
              <span class="text-brand-600 font-black text-2xl">¥<span th:text="${#numbers.formatDecimal(product.price, 0, 1)}"></span></span>
              <form th:if="${session.user != null}" th:action="@{/cart/add}" method="post" class="m-0">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <button type="submit"
                        class="bg-brand-500 hover:bg-brand-600 text-white font-bold py-2 px-4 rounded-xl text-sm shadow-md hover:shadow-lg transition-all active:scale-95">
                  ➕ 加购
                </button>
              </form>
              <a th:unless="${session.user != null}" href="/login"
                 class="bg-gray-300 text-gray-600 font-bold py-2 px-4 rounded-xl text-sm">➕ 加购</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </th:block>
</div>

</body>
</html>
