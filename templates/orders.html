<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">我的订单 - 美味订餐</title>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a href="/" class="text-2xl font-black text-brand-600 tracking-tight">🍽 美味订餐</a>
      <div class="flex items-center gap-4">
        <a href="/cart" class="text-gray-700 hover:text-brand-600 font-medium transition">🛒 购物车</a>
        <a href="/login" class="text-gray-500 hover:text-red-500 text-sm transition">退出</a>
      </div>
    </div>
  </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-black text-gray-800 mb-8">📋 我的订单</h1>

  <div th:if="${orders == null || orders.isEmpty()}" class="text-center py-20">
    <div class="text-6xl mb-4">📭</div>
    <p class="text-gray-500 text-xl">还没有订单</p>
    <a href="/" class="inline-block mt-4 bg-brand-500 text-white px-8 py-3 rounded-full font-bold hover:bg-brand-600 transition">去下单</a>
  </div>

  <div th:each="order : ${orders}" class="bg-white rounded-2xl shadow-md mb-5 overflow-hidden">
    <div class="bg-brand-50 px-6 py-4 flex items-center justify-between">
      <div>
        <span class="text-sm text-gray-500">订单号 #<span th:text="${order.id}"></span></span>
        <span class="mx-3 text-gray-300">|</span>
        <span class="text-sm text-gray-500" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
      </div>
      <span class="text-brand-600 font-black text-xl" th:text="'¥' + ${#numbers.formatDecimal(order.totalPrice, 0, 2)}"></span>
    </div>
    <div class="p-4 space-y-3">
      <div th:each="item : ${order.items}" class="flex items-center gap-3">
        <img th:src="${item.productImageUrl}" th:alt="${item.productName}"
             class="w-14 h-14 rounded-xl object-cover"/>
        <div class="flex-1">
          <p class="font-medium text-gray-800" th:text="${item.productName}"></p>
          <p class="text-sm text-gray-400">
            ¥<span th:text="${#numbers.formatDecimal(item.price, 0, 1)}"></span> × <span th:text="${item.quantity}"></span>
          </p>
        </div>
        <p class="font-bold text-gray-700" th:text="'¥' + ${#numbers.formatDecimal(item.price * item.quantity, 0, 2)}"></p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
