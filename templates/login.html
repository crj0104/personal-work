<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">登录 - 美味订餐</title>
</head>
<body class="bg-gradient-to-br from-brand-50 to-orange-50 min-h-screen font-sans flex items-center justify-center">

<div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4">
  <div class="text-center mb-8">
    <div class="text-6xl mb-4">🍽</div>
    <h1 class="text-3xl font-black text-gray-800">美味订餐</h1>
    <p class="text-gray-500 mt-2">使用手机号登录或注册</p>
  </div>

  <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm mb-5 text-center" th:text="${error}"></div>

  <form th:action="@{/login}" method="post" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">手机号</label>
      <input type="text" name="phone" required placeholder="请输入手机号"
             class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
      <input type="password" name="password" required placeholder="请输入密码"
             class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition"/>
    </div>
    <button type="submit"
            class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-[0.98] text-lg">
      登录 / 注册
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    首次登录将自动注册账号
  </p>
</div>

</body>
</html>
