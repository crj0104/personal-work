<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">订单管理 - 美味订餐</title>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex">

<aside th:replace="~{admin/fragments :: sidebar('orders')}"></aside>

<main class="flex-1 p-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6">📋 全部订单</h2>
  <div class="space-y-4">
    <div th:each="order : ${orders}" class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="bg-brand-50 px-6 py-3 flex items-center justify-between">
        <div>
          <span class="text-sm text-gray-500">订单#<span th:text="${order.id}"></span></span>
          <span class="mx-2 text-gray-300">|</span>
          <span class="text-sm text-gray-500" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
          <span class="mx-2 text-gray-300">|</span>
          <span class="text-sm text-gray-500">用户ID: <span th:text="${order.userId}"></span></span>
        </div>
        <span class="text-brand-600 font-black text-xl" th:text="'¥' + ${#numbers.formatDecimal(order.totalPrice, 0, 2)}"></span>
      </div>
      <div class="p-4 space-y-2">
        <div th:each="item : ${order.items}" class="flex items-center gap-3 text-sm">
          <img th:src="${item.productImageUrl}" th:alt="${item.productName}" class="w-10 h-10 rounded-lg object-cover"/>
          <span class="flex-1" th:text="${item.productName}"></span>
          <span class="text-gray-400">¥<span th:text="${#numbers.formatDecimal(item.price, 0, 1)}"></span> × <span th:text="${item.quantity}"></span></span>
        </div>
      </div>
    </div>
  </div>
</main>

</body>
</html>
