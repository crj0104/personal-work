<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">商品管理 - 美味订餐</title>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex">

<aside th:replace="~{admin/fragments :: sidebar('products')}"></aside>

<main class="flex-1 p-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6">🍕 商品列表</h2>

  <th:block th:each="entry : ${groupedProducts}">
    <h3 class="text-lg font-bold text-gray-700 mt-8 mb-4" th:text="${entry.key.name}"></h3>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div th:each="p : ${entry.value}" class="bg-white rounded-2xl shadow-md p-4 flex items-center gap-4">
        <img th:src="${p.imageUrl}" th:alt="${p.name}" class="w-14 h-14 rounded-xl object-cover"/>
        <div class="flex-1">
          <p class="font-bold text-gray-800" th:text="${p.name}"></p>
          <p class="text-sm text-gray-400">ID: <span th:text="${p.id}"></span></p>
        </div>
        <p class="text-brand-600 font-black text-xl">¥<span th:text="${#numbers.formatDecimal(p.price, 0, 1)}"></span></p>
      </div>
    </div>
  </th:block>
</main>

</body>
</html>
