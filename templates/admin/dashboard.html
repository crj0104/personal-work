<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">管理后台 - 美味订餐</title>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex">

<aside class="w-64 bg-gray-900 text-white min-h-screen flex-shrink-0">
  <div class="p-6">
    <h1 class="text-xl font-black tracking-tight">🍽 管理后台</h1>
  </div>
  <nav class="mt-4">
    <a href="/admin" class="block px-6 py-3 bg-orange-500 text-white font-medium">📊 数据看板</a>
    <a href="/admin/users" class="block px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition font-medium">👥 用户管理</a>
    <a href="/admin/products" class="block px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition font-medium">🍕 商品管理</a>
    <a href="/admin/orders" class="block px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition font-medium">📋 订单管理</a>
    <a href="/logout" class="block px-6 py-3 text-gray-400 hover:text-red-400 transition font-medium mt-8">退出登录</a>
  </nav>
</aside>

<main class="flex-1 p-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6">📊 数据看板</h2>

  <div class="grid grid-cols-3 gap-6 mb-8">
    <div class="bg-white rounded-2xl shadow-md p-6">
      <p class="text-gray-500 text-sm">注册用户</p>
      <p class="text-4xl font-black text-brand-600 mt-2" th:text="${stats.usersCount ?: usersCount}"></p>
    </div>
    <div class="bg-white rounded-2xl shadow-md p-6">
      <p class="text-gray-500 text-sm">订单总数</p>
      <p class="text-4xl font-black text-brand-600 mt-2" th:text="${stats.ordersCount}"></p>
    </div>
    <div class="bg-white rounded-2xl shadow-md p-6">
      <p class="text-gray-500 text-sm">总销售额</p>
      <p class="text-4xl font-black text-brand-600 mt-2" th:text="'¥' + ${#numbers.formatDecimal(stats.totalSales, 0, 2)}"></p>
    </div>
  </div>
</main>

</body>
</html>
