<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
  <title th:remove="all">用户管理 - 美味订餐</title>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex">

<aside th:replace="~{admin/fragments :: sidebar('users')}"></aside>

<main class="flex-1 p-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6">👥 用户列表</h2>
  <div class="bg-white rounded-2xl shadow-md overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="bg-gray-50 text-left text-sm text-gray-500 font-medium">
          <th class="px-6 py-4">ID</th>
          <th class="px-6 py-4">手机号</th>
          <th class="px-6 py-4">角色</th>
          <th class="px-6 py-4">注册时间</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}" class="border-t border-gray-50 hover:bg-gray-50 transition">
          <td class="px-6 py-4 font-mono text-sm" th:text="${u.id}"></td>
          <td class="px-6 py-4 font-medium" th:text="${u.phone}"></td>
          <td class="px-6 py-4">
            <span th:if="${u.role == 'admin'}" class="bg-orange-100 text-orange-700 px-2 py-1 rounded-lg text-xs font-bold">管理员</span>
            <span th:unless="${u.role == 'admin'}" class="bg-blue-100 text-blue-700 px-2 py-1 rounded-lg text-xs font-bold">用户</span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-500" th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

</body>
</html>
